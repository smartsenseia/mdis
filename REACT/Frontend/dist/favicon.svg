<!-- public/favicon.svg -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background -->
  <rect x="0" y="0" width="128" height="128" rx="24" fill="#222222"></rect>

  <!-- Grid / telemetry feel -->
  <g stroke="#ffffff" stroke-width="2" opacity="0.25">
    <line x1="32" y1="24" x2="32" y2="104"></line>
    <line x1="64" y1="24" x2="64" y2="104"></line>
    <line x1="96" y1="24" x2="96" y2="104"></line>

    <line x1="24" y1="32" x2="104" y2="32"></line>
    <line x1="24" y1="64" x2="104" y2="64"></line>
    <line x1="24" y1="96" x2="104" y2="96"></line>
  </g>

  <!-- Telemetry curve -->
  <path d="M24 80 L40 72 L56 76 L72 56 L88 60 L104 44" fill="none" stroke="#00e5ff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></path>

  <!-- Data points -->
  <g fill="#00e5ff">
    <circle cx="24" cy="80" r="3"></circle>
    <circle cx="40" cy="72" r="3"></circle>
    <circle cx="56" cy="76" r="3"></circle>
    <circle cx="72" cy="56" r="3"></circle>
    <circle cx="88" cy="60" r="3"></circle>
    <circle cx="104" cy="44" r="3"></circle>
  </g>
</svg>
